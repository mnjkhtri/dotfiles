set -g default-shell /usr/bin/fish

# Default is Ctrl+b which is awkward. Change to Ctrl+a.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Way easier to remember than % and "
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Ctrl+a then h/j/k/l to move between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ctrl+a then H/J/K/L to resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind c new-window -c "#{pane_current_path}"

# 0 is too far from the prefix key
set -g base-index 1
setw -g pane-base-index 1

# Click panes to select, scroll to scroll, drag to resize
set -g mouse on

# Select text with mouse → automatically copies to clipboard when you release.
set -g set-clipboard off
setw -g mode-keys vi
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xsel --clipboard --input"
bind -T copy-mode-vi MouseDown1Pane send -X cancel

set -g allow-rename off

# Ctrl+a then r to reload this file
bind r source-file ~/.tmux.conf \; display "Config reloaded"

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
