# Starship config
# Two-line prompt: info on top, cursor on bottom

format = """
$directory$git_branch$git_status$cmd_duration
$character"""

right_format = """$nodejs$python$rust$golang$docker_context"""

# Directory
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

# Git branch
[git_branch]
format = " on [$symbol$branch]($style)"
style = "bold purple"
symbol = ""

# Git status — symbols only, no verbose labels
[git_status]
format = '( [$all_status$ahead_behind]($style) )'
style = "bold yellow"
conflicted = "=${count} "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count} "
staged = "+${count} "
untracked = "?${count} "
deleted = "✘${count} "

# Language versions — only shown when in relevant project
[nodejs]
format = " [node $version]($style)"
style = "bold green"
symbol = ""

[python]
format = " [py $version]($style)"
style = "bold yellow"
symbol = ""

[rust]
format = " [rs $version]($style)"
style = "bold red"
symbol = ""

[golang]
format = " [go $version]($style)"
style = "bold cyan"
symbol = ""

[docker_context]
format = " [docker $context]($style)"
style = "bold blue"
symbol = ""

# Command duration — shows if command took longer than 2s
[cmd_duration]
min_time = 2_000
format = " [$duration]($style)"
style = "bold yellow"

# Prompt character — green ❯ on success, red ❯ on failure
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
