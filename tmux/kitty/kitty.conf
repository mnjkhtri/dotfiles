# ---------------------------------------------------------------------------
# tmux/kitty/kitty.conf
#
# Kitty terminal configuration.
# Symlinked to ~/.config/kitty/kitty.conf by _scripts/tmux.sh
# ---------------------------------------------------------------------------

# Shell
shell fish

# Font
font_family      JetBrains Mono
font_size        13.0

# Theme
include themes/catppuccin-mocha.conf

# Window
window_padding_width 8
hide_window_decorations yes

# Cursor
cursor_shape          beam
cursor_blink_interval 0.5

# Scrollback
scrollback_lines 10000

# Copy on select
copy_on_select yes

# Use tmux for multiplexing — disable kitty tabs/windows
# so there's no conflict with tmux bindings
close_on_child_death yes
